<!-- GIFT CARD COMPONENT TEMPLATE -->
<!-- This is a reference template showing how gift cards are structured and styled -->
<!-- Gift cards are dynamically created by JavaScript in js/script.js -->

<div class="col-12 col-sm-6 col-lg-4">
  <div class="gift-card">
    <!-- Gift Name -->
    <h3 class="gift-name">Tên Món Quà</h3>
    
    <!-- Gift Description (Optional) -->
    <p class="gift-description">
      Mô tả chi tiết về món quà này, những thông tin bổ sung mà em muốn chia sẻ.
    </p>
    
    <!-- Gift Link (Optional) -->
    <div class="gift-link">
      <span class="gift-link-label">Xem:</span>
      <a href="https://example.com" target="_blank" rel="noopener noreferrer">
        example.com/product
      </a>
    </div>
  </div>
</div>

<!-- 
STYLING NOTES:
- Responsive grid: 1 col (mobile) → 2 col (tablet) → 3 col (desktop)
- gift-card: white background with soft shadow, rounded corners
- Hover effect: translateY lift and enhanced shadow
- gift-name: pink heading with large font
- gift-description: gray text, optional section
- gift-link: special styling for external links
- All text wraps intelligently for mobile devices

USAGE:
- JavaScript creates instances of this structure dynamically
- Cards are assigned animation delays for staggered appearance
- Links are automatically formatted and validation (URL normalization)
-->
