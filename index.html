<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wish List</title>

  <link rel="icon" type="image/png" href="images/logo.png">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <!-- Navigation Tabs -->
      <ul class="nav nav-tabs tabs-wrapper" id="giftTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="form-tab" data-bs-toggle="tab" data-bs-target="#form-content" type="button" role="tab" aria-controls="form-content" aria-selected="true">Thêm món quà</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="table-tab" data-bs-toggle="tab" data-bs-target="#table-content" type="button" role="tab" aria-controls="table-content" aria-selected="false">Danh sách</button>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content" id="giftTabContent">
        <!-- Tab 1: Form -->
        <div class="tab-pane fade show active" id="form-content" role="tabpanel" aria-labelledby="form-tab">
          <section class="form-section">
            <div class="row">
              <div class="col-lg-8 mx-auto">
                <div class="form-card">
                  <h2 class="form-title">Thêm món quà mới</h2>
                  <form id="giftForm" class="gift-form">
                    <div class="form-group">
                      <label for="ten" class="form-label">Tên món quà <span class="required">*</span></label>
                      <input type="text" class="form-control" id="ten" name="ten" placeholder="Nhập tên món quà" required>
                    </div>

                    <div class="form-group">
                      <label for="link" class="form-label">Link tham khảo</label>
                      <input type="url" class="form-control" id="link" name="link" placeholder="https://example.com">
                    </div>

                    <div class="form-group">
                      <label for="ghichu" class="form-label">Ghi chú</label>
                      <textarea class="form-control" id="ghichu" name="ghichu" placeholder="Thêm ghi chú..." rows="2"></textarea>
                    </div>

                    <div class="form-group">
                      <label class="form-label">Độ mong muốn <span class="required">*</span></label>
                      <div class="star-picker-wrapper" id="starPickerWrapper">
                        <div class="star-picker" id="starPicker">
                          <button type="button" class="star-btn" data-value="1">★</button>
                          <button type="button" class="star-btn" data-value="2">★</button>
                          <button type="button" class="star-btn" data-value="3">★</button>
                          <button type="button" class="star-btn" data-value="4">★</button>
                          <button type="button" class="star-btn" data-value="5">★</button>
                        </div>
                      </div>
                      <span class="star-required-msg" id="starRequiredMsg">Vui lòng chọn độ mong muốn</span>
                      <input type="hidden" id="doMongMuon" name="doMongMuon" value="">
                    </div>

                    <div class="form-actions">
                      <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                  </form>

                  <!-- Inline status banner (toast-style) -->
                  <div id="formBanner" class="form-banner">
                    <span class="form-banner-icon" id="formBannerIcon"></span>
                    <span class="form-banner-message" id="formBannerMessage"></span>
                    <button class="form-banner-close" id="formBannerClose" type="button">×</button>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- Tab 2: Data Table -->
        <div class="tab-pane fade" id="table-content" role="tabpanel" aria-labelledby="table-tab">
          <section class="table-section">
            <div id="tableLoadingState" class="loading-container" style="display: none;">
              <div class="spinner"></div>
              <p>Đang tải danh sách...</p>
            </div>

            <div id="tableEmptyState" class="empty-state" style="display: none;">
              <div class="row">
                <div class="col-12 text-center">
                  <p class="empty-message">Danh sách trống. Hãy thêm những món quà mới nhé! 💝</p>
                </div>
              </div>
            </div>

            <div id="tableWrapper" class="table-wrapper" style="display: none;">
              <div class="table-scroll-container">
                <table class="gifts-table">
                  <thead>
                    <tr>
                      <th>Tên</th>
                      <th>Link</th>
                      <th>Độ mong muốn</th>
                      <th>Ghi chú</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="giftsTableBody">
                    <!-- Dynamically populated -->
                  </tbody>
                </table>
              </div>
            </div>

            <div class="table-reload-bar">
              <button type="button" id="reloadTableBtn" class="btn-reload">Tải lại</button>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editModalLabel">Chỉnh sửa món quà</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="editForm">
            <div class="mb-3">
              <label for="editTen" class="form-label">Tên món quà</label>
              <input type="text" class="form-control" id="editTen" readonly>
            </div>
            <div class="mb-3">
              <label for="editLink" class="form-label">Link tham khảo</label>
              <input type="url" class="form-control" id="editLink" placeholder="https://example.com">
            </div>
            <div class="mb-3">
              <label for="editGhichu" class="form-label">Ghi chú</label>
              <textarea class="form-control" id="editGhichu" rows="3" placeholder="Thêm ghi chú..."></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Độ mong muốn</label>
              <div class="star-picker-wrapper" id="editStarPickerWrapper">
                <div class="star-picker" id="editStarPicker">
                  <button type="button" class="star-btn" data-value="1">★</button>
                  <button type="button" class="star-btn" data-value="2">★</button>
                  <button type="button" class="star-btn" data-value="3">★</button>
                  <button type="button" class="star-btn" data-value="4">★</button>
                  <button type="button" class="star-btn" data-value="5">★</button>
                </div>
              </div>
              <input type="hidden" id="editDoMongMuon" value="">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="button" class="btn btn-primary" id="saveEditBtn">Lưu thay đổi</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Custom JavaScript -->
  <script src="js/script.js"></script>
</body>
</html>
